<svg width="220" height="40" viewBox="0 0 220 40" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Dark background -->
  <rect width="220" height="40" rx="6" fill="#1B1B1F"/>

  <!-- Click/cursor icon -->
  <g transform="translate(2, 4)">
    <!-- Cursor arrow -->
    <path d="M6 2 L6 22 L10 17 L14 26 L16.5 25 L12.5 16 L18 16 Z" 
          fill="#0AAD0A" stroke="#0AAD0A" stroke-width="0.5" stroke-linejoin="round"/>
    <!-- Click ripple circles -->
    <circle cx="18" cy="8" r="3" stroke="#0AAD0A" stroke-width="1.3" fill="none" opacity="0.6"/>
    <circle cx="18" cy="8" r="6" stroke="#0AAD0A" stroke-width="1" fill="none" opacity="0.3"/>
  </g>

  <!-- "One" in white -->
  <text x="38" y="27" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#FFFFFF" letter-spacing="-0.5">One</text>
  <!-- "Click" in green -->
  <text x="82" y="27" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#0AAD0A" letter-spacing="-0.5">Click</text>
  <!-- "Pick" in white -->
  <text x="136" y="27" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#FFFFFF" letter-spacing="-0.5">Pick</text>

  <!-- Underline dot accent -->
  <circle cx="178" cy="32" r="2.5" fill="#0AAD0A"/>

</svg>
